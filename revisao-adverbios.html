<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Partiu Revisão - Advérbios</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

h1{
color:#22c55e;
}

.progress{
background:#1e293b;
height:14px;
border-radius:20px;
overflow:hidden;
margin-bottom:20px;
}

.bar{
height:100%;
width:0%;
background:#22c55e;
transition:0.4s;
}

.mascote{

width:140px;
margin-bottom:10px;
animation:flutuar 3s infinite ease-in-out;

}

@keyframes flutuar{

0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}

}

.feliz{

animation:comemorar 0.6s;

}

@keyframes comemorar{

0%{transform:scale(1)}
50%{transform:scale(1.3) rotate(5deg)}
100%{transform:scale(1)}

}

.triste{

animation:erro 0.6s;

}

@keyframes erro{

0%{transform:rotate(0)}
25%{transform:rotate(-10deg)}
50%{transform:rotate(10deg)}
75%{transform:rotate(-10deg)}
100%{transform:rotate(0)}

}

.pergunta{

font-size:22px;
margin-bottom:20px;

}

.opcoes{

display:grid;
grid-template-columns:1fr 1fr;
gap:12px;

}

.opcao{

background:#1e293b;
padding:15px;
border-radius:10px;
cursor:pointer;
transition:0.2s;
font-weight:bold;

}

.opcao:hover{

background:#334155;
transform:scale(1.05);

}

.correta{

background:#16a34a !important;

}

.errada{

background:#dc2626 !important;

}

.explicacao{

margin-top:20px;
background:#1e293b;
padding:15px;
border-radius:10px;

}

button{

margin-top:20px;
padding:12px 25px;
border:none;
border-radius:10px;
background:#22c55e;
cursor:pointer;
font-size:16px;

}

button:hover{

background:#16a34a;

}

@media(max-width:600px){

.opcoes{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="container">

<img id="capivara" class="mascote" src="CapivaraNerdGenioIA_fundo_transparente.png">

<h1>🎮 Partiu Revisão - Advérbios</h1>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="game"></div>

</div>

<script>

let perguntas=[

{
q:"Os cientistas extremamente curiosos analisaram o fenômeno cuidadosamente. Qual palavra é advérbio?",
o:["cientistas","curiosos","extremamente","fenômeno"],
a:2,
exp:`✅ <b>extremamente</b> é advérbio de intensidade, pois intensifica o adjetivo "curiosos".

❌ cientistas → substantivo (nome de pessoas)

❌ curiosos → adjetivo (caracteriza os cientistas)

❌ fenômeno → substantivo`
},

{
q:"O aluno respondeu rapidamente à pergunta. O advérbio expressa:",
o:["tempo","intensidade","modo","lugar"],
a:2,
exp:`✅ <b>Modo</b>. "Rapidamente" indica a forma como a ação foi realizada.

❌ tempo → indicaria quando (ontem, hoje)

❌ intensidade → indicaria grau (muito, bastante)

❌ lugar → indicaria posição (aqui, ali)`
},

{
q:"Eles chegaram ontem à cidade. O advérbio 'ontem' indica:",
o:["modo","tempo","intensidade","lugar"],
a:1,
exp:`✅ <b>Tempo</b>, pois indica quando a ação ocorreu.

❌ modo → como a ação ocorreu

❌ intensidade → grau da ação

❌ lugar → posição`
},

{
q:"O atleta correu muito rapidamente. 'Muito' funciona como:",
o:["advérbio de intensidade","advérbio de lugar","substantivo","verbo"],
a:0,
exp:`✅ "Muito" intensifica o advérbio "rapidamente", sendo advérbio de intensidade.

❌ lugar → indicaria posição

❌ substantivo → nomearia algo

❌ verbo → indicaria ação`
},

{
q:"Ela sempre estuda antes da prova. O advérbio 'sempre' indica:",
o:["tempo/frequência","modo","lugar","negação"],
a:0,
exp:`✅ "Sempre" indica frequência (tempo habitual).

❌ modo → como algo acontece

❌ lugar → posição

❌ negação → palavras como 'não'`
},

{
q:"Ele mora longe da escola. O advérbio 'longe' indica:",
o:["tempo","lugar","modo","intensidade"],
a:1,
exp:`✅ "Longe" indica distância espacial (lugar).

❌ tempo → quando

❌ modo → como

❌ intensidade → grau`
}

]

let i=0
let pontos=0

function mostrar(){

let q=perguntas[i]

let html=`<div class="pergunta">${q.q}</div><div class="opcoes">`

q.o.forEach((op,index)=>{

html+=`<div class="opcao" onclick="responder(${index})">${op}</div>`

})

html+="</div>"

document.getElementById("game").innerHTML=html

document.getElementById("bar").style.width=((i/perguntas.length)*100)+"%"

}

function capivaraFeliz(){

let c=document.getElementById("capivara")

c.classList.remove("triste")
c.classList.add("feliz")

setTimeout(()=>{

c.classList.remove("feliz")

},500)

}

function capivaraErro(){

let c=document.getElementById("capivara")

c.classList.remove("feliz")
c.classList.add("triste")

setTimeout(()=>{

c.classList.remove("triste")

},500)

}

function responder(x){

let q=perguntas[i]

let opcoes=document.querySelectorAll(".opcao")

if(x===q.a){

opcoes[x].classList.add("correta")

pontos++

capivaraFeliz()

}else{

opcoes[x].classList.add("errada")
opcoes[q.a].classList.add("correta")

capivaraErro()

}

document.getElementById("game").innerHTML+=`<div class="explicacao">${q.exp}</div>`

document.getElementById("game").innerHTML+=`<button onclick="proxima()">Próxima</button>`

}

function proxima(){

i++

if(i<perguntas.length){

mostrar()

}else{

fim()

}

}

function fim(){

document.getElementById("bar").style.width="100%"

document.getElementById("game").innerHTML=`

<h2>🏆 Resultado</h2>

<p>Você acertou <b>${pontos}</b> de ${perguntas.length}</p>

<button onclick="location.reload()">Jogar novamente</button>

`

}

mostrar()

</script>

</body>

</html>
